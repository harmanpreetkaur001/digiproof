<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Evidence Lockbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="app-layout">
  <div class="main-content">
    <div id="topbar-mount"></div>
    <main class="page-content">

      <!-- Welcome Banner -->
      <div class="card mb" id="welcome-banner" style="background:linear-gradient(135deg,#1a3a6b,#2563b0);border-color:rgba(26,58,107,.3);margin-bottom:24px;">
        <div class="flex-between">
          <div>
            <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;" id="welcome-text">Welcome back 👋</h2>
            <p style="color:var(--text-secondary);font-size:14px;" id="role-msg"></p>
          </div>
          <div style="font-size:48px;" id="role-emoji"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(59,130,246,.15);">📁</div>
          <div><div class="stat-value" id="stat-ev">0</div><div class="stat-label">Total Evidence Files</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(245,158,11,.15);">🧾</div>
          <div><div class="stat-value" id="stat-fir">0</div><div class="stat-label">Active FIR Cases</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(16,185,129,.15);">🛡️</div>
          <div><div class="stat-value text-success" id="stat-ver">0</div><div class="stat-label">Integrity Verified ✅</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(139,92,246,.15);">📊</div>
          <div><div class="stat-value" id="stat-act">0</div><div class="stat-label">Recent Activities</div></div>
        </div>
      </div>

      <div class="grid-2">
        <!-- Recent Evidence -->
        <div class="card">
          <div class="flex-between mb-4">
            <h3 style="font-weight:700;">Recent Evidence</h3>
            <a href="evidence.html" style="font-size:12px;color:var(--accent);text-decoration:none;">View all →</a>
          </div>
          <div id="recent-ev"><p class="text-muted text-sm">No evidence uploaded yet.</p></div>
        </div>

        <!-- Audit Activity -->
        <div class="card">
          <div class="flex-between mb-4">
            <h3 style="font-weight:700;">Audit Activity</h3>
            <a href="audit.html" style="font-size:12px;color:var(--accent);text-decoration:none;">View all →</a>
          </div>
          <div id="recent-audit"><p class="text-muted text-sm">No activity yet.</p></div>
        </div>
      </div>

      <!-- Quick Actions (victim only) -->
      <div id="quick-actions" style="display:none;margin-top:20px;">
        <div class="card">
          <h3 style="font-weight:700;margin-bottom:16px;">Quick Actions</h3>
          <div class="flex gap-3 wrap" id="quick-btns"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="app.js"></script>
<script>
  if(!requireAuth()) throw '';
  renderSidebar('dashboard.html');
  renderTopbar('Dashboard');

  const u = DB.user;
  const msgs={victim:'Your evidence is safe and tamper-proof.',police:'Review assigned case evidence and submit change requests.',lawyer:'Access your client case files and submit change requests.',court:'Review and approve or reject evidence submissions.'};
  const emojis={victim:'👤',police:'👮',lawyer:'⚖️',court:'🏛️'};
  document.getElementById('welcome-text').textContent = `Welcome back, ${u.name} 👋`;
  document.getElementById('role-msg').textContent = msgs[u.role]||'';
  document.getElementById('role-emoji').textContent = emojis[u.role]||'👤';

  // Stats
  document.getElementById('stat-ev').textContent = DB.evidence.length;
  document.getElementById('stat-fir').textContent = DB.firs.length;
  document.getElementById('stat-ver').textContent = DB.evidence.length;
  document.getElementById('stat-act').textContent = DB.audit.length;

  // Recent evidence
  const evEl = document.getElementById('recent-ev');
  if(DB.evidence.length){
    evEl.innerHTML = DB.evidence.slice(0,4).map(ev=>`
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:24px;">${fileIcon(ev.fileType)}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ev.originalName}</div>
          <div style="font-size:11px;color:var(--text-secondary);">${fmtDate(ev.uploadedAt)}</div>
        </div>
        <span class="badge badge-verified">✅ Verified</span>
      </div>`).join('');
  }

  // Recent audit
  const auEl = document.getElementById('recent-audit');
  if(DB.audit.length){
    const dotMap={upload:'dot-upload',view:'dot-view',download:'dot-download',verify:'dot-verify',access:'dot-access'};
    auEl.innerHTML = DB.audit.slice(0,5).map(log=>`
      <div class="audit-item">
        <div class="audit-dot ${dotMap[log.action]||'dot-view'}"></div>
        <div style="flex:1;">
          <div style="font-size:13px;"><strong>${log.performedBy}</strong> <span style="color:var(--text-secondary);">${log.action}d</span> <span style="color:var(--accent);">${log.evidenceName||''}</span></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${fmtDate(log.timestamp)}</div>
        </div>
      </div>`).join('');
  }

  if(u.role==='victim'){
    document.getElementById('quick-actions').style.display='block';
    document.getElementById('quick-btns').innerHTML=`
      <a href="upload.html" class="btn btn-primary">📤 Upload Evidence</a>
      <a href="fir.html" class="btn btn-ghost">🧾 New FIR Case</a>
      <a href="access.html" class="btn btn-ghost">🔒 Manage Access</a>`;
  }
  if(u.role==='police'||u.role==='lawyer'){
    document.getElementById('quick-actions').style.display='block';
    const pendingReqs=DB.requests.filter(r=>r.requestedBy===u.name&&r.status==='pending').length;
    document.getElementById('quick-btns').innerHTML=`
      <a href="requests.html" class="btn btn-primary">📝 My Requests ${pendingReqs?`<span style="background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;margin-left:4px;">${pendingReqs}</span>`:''}</a>
      <a href="evidence.html" class="btn btn-ghost">📁 View Evidence</a>`;
  }
  if(u.role==='court'){
    document.getElementById('quick-actions').style.display='block';
    const pendingEv=DB.evidence.filter(e=>!e.courtStatus||e.courtStatus==='pending').length;
    const pendingReqs=DB.requests.filter(r=>r.status==='pending').length;
    document.getElementById('quick-btns').innerHTML=`
      <a href="court-review.html" class="btn btn-primary">🏛️ Court Review ${pendingEv+pendingReqs?`<span style="background:rgba(255,255,255,.25);border-radius:10px;padding:1px 7px;margin-left:4px;">${pendingEv+pendingReqs}</span>`:''}</a>
      <a href="evidence.html" class="btn btn-ghost">📁 All Evidence</a>`;
  }
</script>
</body>
</html>
