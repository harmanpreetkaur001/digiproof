<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Requests — Evidence Lockbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="app-layout">
  <div class="main-content">
    <div id="topbar-mount"></div>
    <main class="page-content">

      <div class="flex-between mb-6">
        <div>
          <h2 style="font-weight:700;">My Change Requests</h2>
          <p class="text-muted text-sm">Requests you have submitted for court review</p>
        </div>
        <button class="btn btn-primary" onclick="openNewRequest()">+ New Request</button>
      </div>

      <!-- New Request Form -->
      <div id="req-form" style="display:none;" class="card mb" style="margin-bottom:20px;">
        <h3 style="font-weight:700;margin-bottom:16px;">Submit Change Request</h3>
        <form onsubmit="submitRequest(event)">
          <div class="form-group">
            <label class="form-label">Select Evidence</label>
            <select id="req-ev" class="form-input" required>
              <option value="">-- Select Evidence --</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Reason / Description</label>
            <textarea id="req-reason" class="form-input" rows="3" placeholder="Describe what change you are requesting and why..." required></textarea>
          </div>
          <div style="display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary">📝 Submit Request</button>
            <button type="button" class="btn btn-ghost" onclick="closeForm()">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Stats -->
      <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;" id="req-stats"></div>

      <!-- Requests List -->
      <div class="card" id="req-list"></div>

    </main>
  </div>
</div>

<script src="app.js"></script>
<script>
  if(!requireAuth()) throw '';
  if(DB.user?.role!=='police' && DB.user?.role!=='lawyer') window.location.href='dashboard.html';
  renderSidebar('requests.html');
  renderTopbar('My Requests');

  function openNewRequest(){
    const sel = document.getElementById('req-ev');
    sel.innerHTML = '<option value="">-- Select Evidence --</option>';
    DB.evidence.forEach(ev=>{
      const o=document.createElement('option'); o.value=ev.id; o.textContent=ev.originalName;
      sel.appendChild(o);
    });
    document.getElementById('req-form').style.display='block';
  }

  function closeForm(){ document.getElementById('req-form').style.display='none'; }

  function submitRequest(e){
    e.preventDefault();
    const evId = document.getElementById('req-ev').value;
    const reason = document.getElementById('req-reason').value.trim();
    const ev = DB.evidence.find(e=>e.id===evId);
    if(!ev) return;
    // Check no existing pending request for same evidence by same user
    const exists = DB.requests.find(r=>r.evidenceId===evId && r.requestedBy===DB.user.name && r.status==='pending');
    if(exists){ alert('⚠️ You already have a pending request for this evidence.'); return; }
    DB.requests.push({id:uid(),evidenceId:evId,evidenceName:ev.originalName,requestedBy:DB.user.name,requestedByRole:DB.user.role,reason,status:'pending',createdAt:new Date().toISOString()});
    addAudit('request', evId, ev.originalName, `Change request submitted: ${reason}`);
    save();
    closeForm();
    document.getElementById('req-reason').value='';
    alert('✅ Request submitted. Awaiting court approval.');
    render();
  }

  function render(){
    const myReqs = DB.requests.filter(r=>r.requestedBy===DB.user.name).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    const counts = {pending:0,approved:0,rejected:0};
    myReqs.forEach(r=>counts[r.status]=(counts[r.status]||0)+1);

    document.getElementById('req-stats').innerHTML = [
      {label:'⏳ Pending',val:counts.pending,bg:'rgba(180,83,9,.12)',color:'#b45309'},
      {label:'✅ Approved',val:counts.approved,bg:'rgba(13,122,78,.12)',color:'#0d7a4e'},
      {label:'❌ Rejected',val:counts.rejected,bg:'rgba(192,57,43,.12)',color:'#c0392b'},
    ].map(s=>`<div style="padding:10px 18px;border-radius:8px;background:${s.bg};border:1px solid ${s.color}33;">
      <span style="color:${s.color};font-size:13px;font-weight:700;">${s.label} <span style="margin-left:6px;">${s.val}</span></span>
    </div>`).join('');

    const el = document.getElementById('req-list');
    if(!myReqs.length){
      el.innerHTML=`<div style="text-align:center;padding:48px;"><div style="font-size:40px;margin-bottom:10px;">📝</div><p class="text-muted">No requests submitted yet.</p></div>`;
      return;
    }

    el.innerHTML = `<table><thead><tr><th>Evidence</th><th>Reason</th><th>Status</th><th>Court Note</th><th>Date</th></tr></thead><tbody>` +
      myReqs.map(r=>{
        const statusBadge = r.status==='approved'
          ? `<span class="badge badge-verified">✅ Approved</span>`
          : r.status==='rejected'
          ? `<span class="badge badge-tampered">❌ Rejected</span>`
          : `<span class="badge badge-pending">⏳ Pending</span>`;
        return `<tr>
          <td style="font-weight:600;">${r.evidenceName}</td>
          <td style="color:var(--text-secondary);max-width:220px;">${r.reason}</td>
          <td>${statusBadge}</td>
          <td style="color:var(--text-secondary);font-size:12px;">${r.courtNote||'—'}</td>
          <td style="color:var(--text-muted);font-size:12px;">${fmtDate(r.createdAt)}</td>
        </tr>`;
      }).join('') + `</tbody></table>`;
  }

  render();
</script>
</body>
</html>
