<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Evidence — Evidence Lockbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="app-layout">
  <div class="main-content">
    <div id="topbar-mount"></div>
    <main class="page-content">

      <div class="flex-between mb-6">
        <div style="position:relative;">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);">🔍</span>
          <input id="search" class="form-input" style="padding-left:36px;width:280px;" placeholder="Search by name, FIR, category..." oninput="filterEvidence()">
        </div>
        <div id="upload-btn-wrap"></div>
      </div>

      <div id="ev-grid">
        <div class="card text-center" style="padding:60px;">
          <div style="font-size:48px;margin-bottom:12px;">📂</div>
          <h3 style="margin-bottom:8px;">No evidence found</h3>
          <p class="text-muted text-sm">Upload your first piece of evidence to get started.</p>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="app.js"></script>
<script>
  if(!requireAuth()) throw '';
  renderSidebar('evidence.html');
  renderTopbar('My Evidence');

  if(DB.user?.role==='victim'){
    document.getElementById('upload-btn-wrap').innerHTML = `<a href="upload.html" class="btn btn-primary">+ Upload Evidence</a>`;
  }

  let allEvidence = [...DB.evidence];

  function filterEvidence(){
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allEvidence.filter(e=>
      e.originalName.toLowerCase().includes(q)||
      (e.firNumber||'').toLowerCase().includes(q)||
      (e.category||'').toLowerCase().includes(q)
    );
    renderGrid(filtered);
  }

  function renderGrid(list){
    const el = document.getElementById('ev-grid');
    const role = DB.user?.role;
    if(!list.length){
      el.innerHTML=`<div class="card text-center" style="padding:60px;"><div style="font-size:48px;margin-bottom:12px;">📂</div><h3 style="margin-bottom:8px;">No evidence found</h3><p class="text-muted text-sm">Upload your first piece of evidence to get started.</p></div>`;
      return;
    }
    el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;">` +
      list.map(ev=>{
        const statusBadge = ev.courtStatus==='approved'
          ? `<span class="badge badge-verified">✅ Approved</span>`
          : ev.courtStatus==='rejected'
          ? `<span class="badge badge-tampered">❌ Rejected</span>`
          : `<span class="badge badge-pending">⏳ Pending</span>`;
        const myReq = DB.requests.find(r=>r.evidenceId===ev.id && r.requestedBy===DB.user?.name && r.status==='pending');
        const actionBtns = [
          `<a href="evidence-detail.html?id=${ev.id}" class="btn btn-ghost btn-sm">👁 View</a>`,
          `<button class="btn btn-success btn-sm" onclick="verifyEv('${ev.id}',this)">🛡️ Verify</button>`,
          (role==='lawyer'||role==='court'||role==='victim') ? `<button class="btn btn-ghost btn-sm" onclick="downloadEv('${ev.id}')">⬇ Download</button>` : '',
          (role==='police'||role==='lawyer') ? (myReq ? `<span class="badge badge-pending" style="padding:5px 10px;">📝 Requested</span>` : `<button class="btn btn-ghost btn-sm" onclick="openRequest('${ev.id}')">📝 Request Change</button>`) : '',
          role==='court' ? `<button class="btn btn-success btn-sm" onclick="courtAction('${ev.id}','approved')">✅ Approve</button><button class="btn btn-danger btn-sm" onclick="courtAction('${ev.id}','rejected')">❌ Reject</button>` : '',
        ].filter(Boolean).join('');
        return `
        <div class="card card-hover">
          <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;">
            <span style="font-size:32px;">${fileIcon(ev.fileType)}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ev.originalName}</div>
              <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${ev.category} • ${fmtSize(ev.fileSize)}</div>
              ${ev.firNumber?`<div style="font-size:11px;color:var(--warning);margin-top:2px;">📋 ${ev.firNumber}</div>`:''}
            </div>
            ${statusBadge}
          </div>
          <div style="background:var(--bg-hover);border-radius:6px;padding:8px 10px;margin-bottom:12px;">
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;">SHA-256 HASH</div>
            <div class="hash-text" style="font-size:10px;">${truncHash(ev.hash)}</div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">📅 ${fmtDate(ev.uploadedAt)} • by ${ev.uploadedBy}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">${actionBtns}</div>
        </div>`;
      }).join('') + `</div>`;
  }

  async function verifyEv(id, btn){
    const ev = DB.evidence.find(e=>e.id===id);
    if(!ev) return;
    btn.disabled=true; btn.textContent='⏳...';
    addAudit('verify', ev.id, ev.originalName, 'Integrity check performed');
    save();
    await new Promise(r=>setTimeout(r,800));
    btn.disabled=false; btn.textContent='🛡️ Verify';
    alert('✅ Integrity Verified — File is untampered\nHash: '+ev.hash);
  }

  function downloadEv(id){
    const ev = DB.evidence.find(e=>e.id===id);
    if(!ev||!ev.fileData){ alert('File data not available in demo mode.'); return; }
    addAudit('download', ev.id, ev.originalName, 'File downloaded');
    save();
    const a=document.createElement('a'); a.href=ev.fileData; a.download=ev.originalName; a.click();
  }

  // Request modal
  function openRequest(evId){
    const ev = DB.evidence.find(e=>e.id===evId);
    if(!ev) return;
    const reason = prompt(`Submit a change request for "${ev.originalName}"\n\nDescribe what change you are requesting:`);
    if(!reason||!reason.trim()) return;
    DB.requests.push({id:uid(),evidenceId:evId,evidenceName:ev.originalName,requestedBy:DB.user.name,requestedByRole:DB.user.role,reason:reason.trim(),status:'pending',createdAt:new Date().toISOString()});
    addAudit('request', evId, ev.originalName, `Change request submitted by ${DB.user.name}: ${reason.trim()}`);
    save();
    alert('✅ Request submitted. Awaiting court approval.');
    renderGrid(allEvidence);
  }

  // Court approve/reject evidence
  function courtAction(evId, action){
    const ev = DB.evidence.find(e=>e.id===evId);
    if(!ev) return;
    if(!confirm(`${action==='approved'?'Approve':'Reject'} evidence "${ev.originalName}"?`)) return;
    ev.courtStatus = action;
    addAudit(action, evId, ev.originalName, `Evidence ${action} by court`);
    save();
    renderGrid(allEvidence);
  }

  renderGrid(allEvidence);
</script>
</body>
</html>
