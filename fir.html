<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FIR Cases — Evidence Lockbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="app-layout">
  <div class="main-content">
    <div id="topbar-mount"></div>
    <main class="page-content">

      <div class="flex-between mb-6">
        <div>
          <h2 style="font-weight:700;">FIR Case Management</h2>
          <p class="text-muted text-sm">Link evidence to FIR numbers for organized case management</p>
        </div>
        <div id="new-fir-btn"></div>
      </div>

      <!-- Create FIR Form -->
      <div id="fir-form" style="display:none;" class="card mb" style="margin-bottom:20px;">
        <h3 style="font-weight:700;margin-bottom:16px;">Register New FIR Case</h3>
        <form onsubmit="createFIR(event)">
          <div class="grid-2">
            <div class="form-group">
              <label class="form-label">FIR Number</label>
              <input id="inp-firno" class="form-input" placeholder="e.g. FIR/2024/001" required>
            </div>
            <div class="form-group">
              <label class="form-label">Case Title</label>
              <input id="inp-title" class="form-input" placeholder="Brief case title" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="inp-desc" class="form-input" rows="3" placeholder="Case description..."></textarea>
          </div>
          <div style="display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary">Create FIR Case</button>
            <button type="button" class="btn btn-ghost" onclick="document.getElementById('fir-form').style.display='none'">Cancel</button>
          </div>
        </form>
      </div>

      <div id="fir-list"></div>

    </main>
  </div>
</div>

<script src="app.js"></script>
<script>
  if(!requireAuth()) throw '';
  renderSidebar('fir.html');
  renderTopbar('FIR Cases');

  if(DB.user?.role==='victim'){
    document.getElementById('new-fir-btn').innerHTML=`<button class="btn btn-primary" onclick="document.getElementById('fir-form').style.display='block'">+ New FIR Case</button>`;
  }

  function createFIR(e){
    e.preventDefault();
    const firNumber = document.getElementById('inp-firno').value.trim();
    if(DB.firs.find(f=>f.firNumber===firNumber)){ alert('FIR number already exists'); return; }
    const fir = {id:uid(),firNumber,title:document.getElementById('inp-title').value.trim(),description:document.getElementById('inp-desc').value.trim(),status:'open',createdAt:new Date().toISOString(),createdBy:DB.user.name};
    DB.firs.unshift(fir); save();
    document.getElementById('fir-form').style.display='none';
    document.getElementById('inp-firno').value='';
    document.getElementById('inp-title').value='';
    document.getElementById('inp-desc').value='';
    renderFIRs();
  }

  function toggleFIR(id){
    const body = document.getElementById('fir-body-'+id);
    const icon = document.getElementById('fir-icon-'+id);
    if(body.style.display==='none'){ body.style.display='block'; icon.textContent='▲'; }
    else { body.style.display='none'; icon.textContent='▼'; }
  }

  function changeStatus(id, val){
    const fir = DB.firs.find(f=>f.id===id);
    if(fir){ fir.status=val; save(); }
  }

  function renderFIRs(){
    const el = document.getElementById('fir-list');
    if(!DB.firs.length){
      el.innerHTML=`<div class="card text-center" style="padding:60px;"><div style="font-size:48px;margin-bottom:12px;">📋</div><h3 style="margin-bottom:8px;">No FIR Cases</h3><p class="text-muted text-sm">Create a FIR case to link your evidence.</p></div>`;
      return;
    }
    const statusMap={open:'badge-open',under_review:'badge-pending',closed:'badge-closed'};
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px;">` +
      DB.firs.map(fir=>{
        const linked = DB.evidence.filter(e=>e.firNumber===fir.firNumber);
        return `
        <div class="card">
          <div class="flex-between" style="cursor:pointer;" onclick="toggleFIR('${fir.id}')">
            <div style="display:flex;align-items:center;gap:14px;">
              <div style="width:44px;height:44px;background:rgba(245,158,11,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;">📋</div>
              <div>
                <div style="font-weight:700;font-size:15px;">${fir.title}</div>
                <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">${fir.firNumber} • ${linked.length} evidence file(s) • ${fmtDate(fir.createdAt)}</div>
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="badge ${statusMap[fir.status]||'badge-open'}">${fir.status.replace('_',' ')}</span>
              <span id="fir-icon-${fir.id}">▼</span>
            </div>
          </div>
          <div id="fir-body-${fir.id}" style="display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
            ${fir.description?`<p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">${fir.description}</p>`:''}
            ${DB.user?.role==='victim'?`
            <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px;">
              <label class="form-label" style="margin:0;">Status:</label>
              <select class="form-input" style="width:160px;" onchange="changeStatus('${fir.id}',this.value)">
                <option value="open" ${fir.status==='open'?'selected':''}>Open</option>
                <option value="under_review" ${fir.status==='under_review'?'selected':''}>Under Review</option>
                <option value="closed" ${fir.status==='closed'?'selected':''}>Closed</option>
              </select>
            </div>`:''}
            <h4 style="font-weight:600;margin-bottom:10px;font-size:13px;">Linked Evidence (${linked.length})</h4>
            ${linked.length===0?'<p class="text-muted text-sm">No evidence linked to this FIR yet.</p>':
              linked.map(ev=>`
              <a href="evidence-detail.html?id=${ev.id}" style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-hover);border-radius:8px;cursor:pointer;text-decoration:none;color:inherit;margin-bottom:6px;">
                <span>${fileIcon(ev.fileType)}</span>
                <div style="flex:1;">
                  <div style="font-size:13px;font-weight:500;">${ev.originalName}</div>
                  <div style="font-size:11px;color:var(--text-secondary);">${fmtSize(ev.fileSize)} • ${fmtDate(ev.uploadedAt)}</div>
                </div>
                <span class="badge badge-verified">🔒 Locked</span>
              </a>`).join('')}
          </div>
        </div>`;
      }).join('') + `</div>`;
  }

  renderFIRs();
</script>
</body>
</html>
