<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Court Review — Evidence Lockbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="app-layout">
  <div class="main-content">
    <div id="topbar-mount"></div>
    <main class="page-content">

      <!-- Header -->
      <div class="card mb" style="background:linear-gradient(135deg,#b45309,#92400e);border-color:rgba(180,83,9,.3);margin-bottom:24px;">
        <div class="flex-between">
          <div>
            <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;color:#fff;">🏛️ Court Review Panel</h2>
            <p style="color:rgba(255,255,255,.75);font-size:13px;">Approve or reject evidence submissions and change requests from police &amp; lawyers</p>
          </div>
          <div style="font-size:48px;">⚖️</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-grid" style="margin-bottom:24px;">
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(180,83,9,.15);">⏳</div>
          <div><div class="stat-value" id="stat-pending">0</div><div class="stat-label">Pending Evidence</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(13,122,78,.15);">✅</div>
          <div><div class="stat-value text-success" id="stat-approved">0</div><div class="stat-label">Approved</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(192,57,43,.15);">❌</div>
          <div><div class="stat-value text-danger" id="stat-rejected">0</div><div class="stat-label">Rejected</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:rgba(99,102,241,.15);">📝</div>
          <div><div class="stat-value" id="stat-requests">0</div><div class="stat-label">Pending Requests</div></div>
        </div>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:4px;margin-bottom:20px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;">
        <button class="btn btn-primary btn-sm" id="tab-ev" onclick="switchTab('evidence')">📁 Evidence Review</button>
        <button class="btn btn-ghost btn-sm" id="tab-req" onclick="switchTab('requests')">📝 Change Requests</button>
      </div>

      <!-- Evidence Review Panel -->
      <div id="panel-evidence">
        <div class="card" id="ev-review-list"></div>
      </div>

      <!-- Change Requests Panel -->
      <div id="panel-requests" style="display:none;">
        <div class="card" id="req-review-list"></div>
      </div>

    </main>
  </div>
</div>

<script src="app.js"></script>
<script>
  if(!requireAuth()) throw '';
  if(DB.user?.role !== 'court') window.location.href='dashboard.html';
  renderSidebar('court-review.html');
  renderTopbar('Court Review');

  function switchTab(tab){
    document.getElementById('panel-evidence').style.display = tab==='evidence'?'block':'none';
    document.getElementById('panel-requests').style.display = tab==='requests'?'block':'none';
    document.getElementById('tab-ev').className = tab==='evidence'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
    document.getElementById('tab-req').className = tab==='requests'?'btn btn-primary btn-sm':'btn btn-ghost btn-sm';
  }

  function approveEvidence(id){
    const ev = DB.evidence.find(e=>e.id===id);
    if(!ev||!confirm(`Approve evidence "${ev.originalName}"?`)) return;
    ev.courtStatus='approved';
    addAudit('approved', id, ev.originalName, `Evidence approved by ${DB.user.name}`);
    save(); renderAll();
  }

  function rejectEvidence(id){
    const ev = DB.evidence.find(e=>e.id===id);
    if(!ev) return;
    const note = prompt(`Reject evidence "${ev.originalName}"\n\nProvide reason for rejection (optional):`)||'';
    ev.courtStatus='rejected';
    ev.courtNote=note;
    addAudit('rejected', id, ev.originalName, `Evidence rejected by ${DB.user.name}${note?': '+note:''}`);
    save(); renderAll();
  }

  function approveRequest(id){
    const req = DB.requests.find(r=>r.id===id);
    if(!req||!confirm(`Approve change request for "${req.evidenceName}"?`)) return;
    req.status='approved';
    req.courtNote='Approved by court';
    req.reviewedAt=new Date().toISOString();
    addAudit('approved', req.evidenceId, req.evidenceName, `Change request approved for ${req.requestedBy}`);
    save(); renderAll();
  }

  function rejectRequest(id){
    const req = DB.requests.find(r=>r.id===id);
    if(!req) return;
    const note = prompt(`Reject request for "${req.evidenceName}"\n\nProvide reason:`)||'Rejected by court';
    req.status='rejected';
    req.courtNote=note;
    req.reviewedAt=new Date().toISOString();
    addAudit('rejected', req.evidenceId, req.evidenceName, `Change request rejected for ${req.requestedBy}: ${note}`);
    save(); renderAll();
  }

  function renderAll(){
    const pending = DB.evidence.filter(e=>!e.courtStatus||e.courtStatus==='pending');
    const approved = DB.evidence.filter(e=>e.courtStatus==='approved');
    const rejected = DB.evidence.filter(e=>e.courtStatus==='rejected');
    const pendingReqs = DB.requests.filter(r=>r.status==='pending');

    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-approved').textContent = approved.length;
    document.getElementById('stat-rejected').textContent = rejected.length;
    document.getElementById('stat-requests').textContent = pendingReqs.length;

    // Evidence review
    const evEl = document.getElementById('ev-review-list');
    if(!DB.evidence.length){
      evEl.innerHTML=`<div style="text-align:center;padding:48px;"><div style="font-size:40px;margin-bottom:10px;">📂</div><p class="text-muted">No evidence submitted yet.</p></div>`;
    } else {
      evEl.innerHTML = `<table><thead><tr><th>File</th><th>Submitted By</th><th>FIR</th><th>Category</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody>` +
        DB.evidence.map(ev=>{
          const status = ev.courtStatus||'pending';
          const statusBadge = status==='approved'
            ? `<span class="badge badge-verified">✅ Approved</span>`
            : status==='rejected'
            ? `<span class="badge badge-tampered">❌ Rejected</span>`
            : `<span class="badge badge-pending">⏳ Pending</span>`;
          const actions = status==='pending'
            ? `<button class="btn btn-success btn-sm" onclick="approveEvidence('${ev.id}')">✅ Approve</button>
               <button class="btn btn-danger btn-sm" onclick="rejectEvidence('${ev.id}')">❌ Reject</button>`
            : `<span style="font-size:12px;color:var(--text-muted);">Reviewed</span>`;
          return `<tr>
            <td>${fileIcon(ev.fileType)} <span style="font-weight:600;">${ev.originalName}</span></td>
            <td>${ev.uploadedBy}</td>
            <td style="color:var(--warning);">${ev.firNumber||'—'}</td>
            <td>${ev.category}</td>
            <td style="color:var(--text-muted);font-size:12px;">${fmtDate(ev.uploadedAt)}</td>
            <td>${statusBadge}</td>
            <td><div style="display:flex;gap:6px;">${actions}</div></td>
          </tr>`;
        }).join('') + `</tbody></table>`;
    }

    // Change requests review
    const reqEl = document.getElementById('req-review-list');
    const allReqs = DB.requests.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    if(!allReqs.length){
      reqEl.innerHTML=`<div style="text-align:center;padding:48px;"><div style="font-size:40px;margin-bottom:10px;">📝</div><p class="text-muted">No change requests submitted yet.</p></div>`;
    } else {
      reqEl.innerHTML = `<table><thead><tr><th>Evidence</th><th>Requested By</th><th>Role</th><th>Reason</th><th>Status</th><th>Court Note</th><th>Action</th></tr></thead><tbody>` +
        allReqs.map(r=>{
          const statusBadge = r.status==='approved'
            ? `<span class="badge badge-verified">✅ Approved</span>`
            : r.status==='rejected'
            ? `<span class="badge badge-tampered">❌ Rejected</span>`
            : `<span class="badge badge-pending">⏳ Pending</span>`;
          const actions = r.status==='pending'
            ? `<button class="btn btn-success btn-sm" onclick="approveRequest('${r.id}')">✅ Approve</button>
               <button class="btn btn-danger btn-sm" onclick="rejectRequest('${r.id}')">❌ Reject</button>`
            : `<span style="font-size:12px;color:var(--text-muted);">${fmtDate(r.reviewedAt)}</span>`;
          return `<tr>
            <td style="font-weight:600;">${r.evidenceName}</td>
            <td>${r.requestedBy}</td>
            <td><span class="badge badge-open">${r.requestedByRole}</span></td>
            <td style="color:var(--text-secondary);max-width:200px;font-size:12px;">${r.reason}</td>
            <td>${statusBadge}</td>
            <td style="color:var(--text-muted);font-size:12px;">${r.courtNote||'—'}</td>
            <td><div style="display:flex;gap:6px;">${actions}</div></td>
          </tr>`;
        }).join('') + `</tbody></table>`;
    }
  }

  renderAll();
</script>
</body>
</html>
